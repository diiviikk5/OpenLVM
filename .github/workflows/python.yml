name: Python

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  test-python:
    runs-on: ubuntu-latest
    env:
      OPENLVM_RUNTIME: simulated
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        working-directory: python
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest python/tests -q

      - name: CLI doctor
        working-directory: python
        run: python -m openlvm.cli doctor

  test-python-zig-cli:
    runs-on: windows-latest
    env:
      OPENLVM_RUNTIME: zig
      OPENLVM_REQUIRE_PARENT_API: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Clean build artifacts
        working-directory: core
        run: |
          if (Test-Path zig-out) { Remove-Item -LiteralPath zig-out -Recurse -Force }
          if (Test-Path .zig-cache) { Remove-Item -LiteralPath .zig-cache -Recurse -Force }

      - name: Build core
        working-directory: core
        run: zig build

      - name: Install Python package
        working-directory: python
        run: python -m pip install -e ".[dev]"

      - name: Run OpenLVM CLI integration against Zig core
        run: python -m openlvm.cli test examples/swarm.yaml --scenarios 2 --chaos network_delay
