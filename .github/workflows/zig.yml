name: Zig

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  test-zig:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Clean build artifacts
        working-directory: core
        run: rm -rf zig-out .zig-cache

      - name: Build core
        working-directory: core
        run: zig build

      - name: Run Zig tests
        working-directory: core
        run: zig build test

      - name: Run self-test
        working-directory: core
        run: ./zig-out/bin/openlvm-core selftest

  test-python-zig:
    runs-on: windows-latest
    env:
      OPENLVM_RUNTIME: zig
      OPENLVM_REQUIRE_PARENT_API: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Clean build artifacts
        working-directory: core
        run: |
          if (Test-Path zig-out) { Remove-Item -LiteralPath zig-out -Recurse -Force }
          if (Test-Path .zig-cache) { Remove-Item -LiteralPath .zig-cache -Recurse -Force }

      - name: Build core
        working-directory: core
        run: zig build

      - name: Install Python package
        working-directory: python
        run: python -m pip install -e ".[dev]"

      - name: Run Zig-backed integration tests
        run: python -m pytest python/tests/test_runtime.py python/tests/test_integration_zig.py -q

      - name: Run OpenLVM CLI against Zig core
        run: python -m openlvm.cli test examples/swarm.yaml --scenarios 2 --chaos network_delay
