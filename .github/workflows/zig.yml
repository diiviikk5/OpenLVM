name: Zig

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  test-zig:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build core
        working-directory: core
        run: zig build

      - name: Run Zig tests
        working-directory: core
        run: zig build test

      - name: Run self-test
        working-directory: core
        run: ./zig-out/bin/openlvm-core selftest
