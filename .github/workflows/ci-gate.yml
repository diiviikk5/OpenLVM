name: CI Gate

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "python/**"
      - "solana/**"
      - ".github/workflows/ci-gate.yml"
      - "README.md"
  push:
    branches:
      - master
    paths:
      - "python/**"
      - "solana/**"
      - ".github/workflows/ci-gate.yml"
      - "README.md"

jobs:
  ci-gate:
    runs-on: ubuntu-latest
    env:
      OPENLVM_RUNTIME: simulated
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        working-directory: python
        run: python -m pip install -e ".[dev]"

      - name: Run doctor and preflight
        run: |
          mkdir -p artifacts
          python -m openlvm.cli doctor --json --output-file artifacts/doctor.json
          python -m openlvm.cli arena-preflight --json --output-file artifacts/arena-preflight.json || true

      - name: Run consolidated gate
        id: gate
        continue-on-error: true
        run: |
          python -m openlvm.cli ci-gate --json --output-file artifacts/ci-gate.json

      - name: Upload gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-gate-artifacts
          path: artifacts/*.json
          if-no-files-found: warn

      - name: Publish gate summary
        if: always()
        run: |
          if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
            python scripts/ci_gate_summary.py --artifacts-dir artifacts --output "$GITHUB_STEP_SUMMARY"
          else
            python scripts/ci_gate_summary.py --artifacts-dir artifacts
          fi

      - name: Enforce gate status
        if: steps.gate.outcome != 'success'
        run: |
          echo "ci-gate reported failure; inspect artifacts for details."
          exit 1
